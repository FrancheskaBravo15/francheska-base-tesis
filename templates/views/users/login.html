{% extends 'base.html' %}
 
{% block body %}
 
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">Iniciar Sesión</h4>
 
                <form method="POST" action="{{ url_for('users.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
 
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ email | default('') }}" required>
                    </div>
 
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
 
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            Iniciar Sesión
                        </button>
                    </div>
 
                    <div class="text-center mt-3">
                        <small>¿No tienes cuenta? <a href="{{ url_for('users.register') }}">Regístrate aquí</a></small>
                    </div>
 
                </form>
            </div>
        </div>
    </div>
</div>
 
{% endblock %}
